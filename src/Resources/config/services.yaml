services:
  # default configuration for services in *this* file
  _defaults:
    autowire: true      # Automatically injects depkendencies in your services.
    autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

  Brizy\Bundle\ApiEntitiesBundle\:
    resource: '../../../src/*'
    exclude: '../../../src/{DependencyInjection,Resources,Entity,BrizyApiEntitiesBundle.php}'
    public: true

  brizy.entity.collection_item_repository:
    class: Brizy\Bundle\ApiEntitiesBundle\
    factory: [ '@doctrine.orm.entity_manager', getRepository ]
    arguments:
      - BrizyApiEntitiesBundle\Entity\Collections\CollectionItem